name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: [arc-runner-unityinflow]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run lint
        name: Type check

      - run: npm run format
        name: Format check

      - run: npm test
        name: Run tests

      - run: npm run build
        name: Build action
